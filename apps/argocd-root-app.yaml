apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multi-tier-task-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mrk-97/cloujen-gitops.git'
    targetRevision: main
    path: apps/task-manager # <--- CHANGE THIS from apps/task-manager to match your tree
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: core-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ForceConflicts=true