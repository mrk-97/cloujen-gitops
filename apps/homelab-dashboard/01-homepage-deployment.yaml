# 1. Create a 1GB persistent volume for your dashboard configurations
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homepage-config-pvc
  namespace: homelab
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
# 2. Update the Deployment to mount the volume and whitelist the domain
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:latest
        ports:
        - containerPort: 3000
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "home.cloujen.com,start.cloujen.com"
        volumeMounts:
        # Keep the existing PVC for other auto-generated config files
        - name: config-volume
          mountPath: /app/config
        # Mount our specific GitOps files over top of the PVC
        - name: gitops-config
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
        - name: gitops-config
          mountPath: /app/config/services.yaml
          subPath: services.yaml
      volumes:
      - name: config-volume
        persistentVolumeClaim:
          claimName: homepage-config-pvc
      # Define the new ConfigMap volume
      - name: gitops-config
        configMap:
          name: homepage-config
---
# 3. The Service
apiVersion: v1
kind: Service
metadata:
  name: homepage-svc
  namespace: homelab
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: homepage