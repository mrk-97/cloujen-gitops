apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-svc
  namespace: homelab
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: homepage