apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage-ingress
  namespace: homelab
  annotations:
    kubernetes.io/ingress.class: nginx
    # --- The Authentication Lock ---
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: homelab-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Cloujen Secure Zone"
    # --- The SSL Trigger ---
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
  - host: home.cloujen.com # Your dashboard URL
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homepage-svc
            port:
              number: 3000
# --- THE CERTIFICATE BINDING ---
  tls:
  - hosts:
    - home.cloujen.com
    secretName: homepage-tls-cert # Cert-manager will automatically create this secret