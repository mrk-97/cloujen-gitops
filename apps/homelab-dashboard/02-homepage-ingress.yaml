apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage-ingress
  namespace: homelab
  annotations:
    kubernetes.io/ingress.class: nginx
    # --- The Authentication Lock ---
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: homelab-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Cloujen Secure Zone"
spec:
  rules:
  - host: home.cloujen.com # Your dashboard URL
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homepage-svc
            port:
              number: 3000