apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homelab
data:
  settings.yaml: |
    title: Cloujen Secure Zone
    background: "https://images.unsplash.com/photo-1607706126834-a0fe502e9365"
    theme: dark
    layout:
      Infrastructure:
        style: row
        columns: 3
      Applications:
        style: row
        columns: 3

  services.yaml: |
    - Infrastructure:
        - Argo CD:
            href: https://argocd.cloujen.com
            description: GitOps Control Plane
            icon: argo
        - Pi-hole:
            href: https://pihole.cloujen.com/admin
            description: Local DNS & Ad Blocker
            icon: pihole
            widget:
              type: pihole
              url: http://192.168.1.10
              key: "YOUR_PIHOLE_API_TOKEN" # Don't forget to swap this with the real API key!
        - Proxmox VE:
            href: https://192.168.1.100:8006
            description: Hypervisor
            icon: proxmox
            
    - Applications:
        - PodInfo:
            href: https://tasks.cloujen.com
            description: Go + Postgres Production Workload
            icon: go
            
    - Quick Links:
        - GitHub Repo:
            href: https://github.com/mrk-97/cloujen-gitops
            icon: github