apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-dashboard-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mrk-97/cloujen-gitops.git'
    targetRevision: main
    path: apps/homelab-dashboard # <--- Points to your new dashboard folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: homelab           # <--- Safely isolates it in the homelab namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ForceConflicts=true